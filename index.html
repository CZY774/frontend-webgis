<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Sistem Informasi Geografis Desa Prawoto, Sukolilo, Pati. Peta interaktif fasilitas umum, UMKM, wisata, dan data kependudukan."
    />
    <meta
      name="keywords"
      content="SIG Desa Prawoto, Peta Prawoto, GIS Prawoto, Sukolilo, Pati, Wisata Prawoto, UMKM Prawoto"
    />
    <meta name="author" content="Desa Prawoto" />
    <meta name="geo.region" content="ID-JT" />
    <meta name="geo.placename" content="Desa Prawoto, Sukolilo, Pati" />
    <meta name="geo.position" content="-6.963;110.828" />
    <meta name="ICBM" content="-6.963, 110.828" />
    <title>SIG Desa Prawoto - Peta Interaktif</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🗺️</text></svg>"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="#"> SIG Desa Prawoto </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link fw-semibold" href="admin.html">Admin</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <div class="col-lg-3 col-md-4 p-0">
          <div class="sidebar">
            <h5>Pencarian</h5>
            <div class="mb-4">
              <input
                type="text"
                class="form-control"
                id="searchInput"
                placeholder="Cari lokasi, nama tempat..."
              />
            </div>

            <h5>Layer Peta</h5>
            <div class="accordion" id="filterAccordion">
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button
                    class="accordion-button"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#fasilitasFilter"
                  >
                    Fasilitas Umum
                  </button>
                </h2>
                <div
                  id="fasilitasFilter"
                  class="accordion-collapse collapse show"
                >
                  <div class="accordion-body">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="showFasilitas"
                        checked
                      />
                      <label class="form-check-label" for="showFasilitas">
                        Tampilkan Semua
                      </label>
                    </div>
                  </div>
                </div>
              </div>

              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button
                    class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#umkmFilter"
                  >
                    UMKM
                  </button>
                </h2>
                <div id="umkmFilter" class="accordion-collapse collapse">
                  <div class="accordion-body">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="showUMKM"
                        checked
                      />
                      <label class="form-check-label" for="showUMKM">
                        Tampilkan Semua
                      </label>
                    </div>
                  </div>
                </div>
              </div>

              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button
                    class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#wisataFilter"
                  >
                    Wisata
                  </button>
                </h2>
                <div id="wisataFilter" class="accordion-collapse collapse">
                  <div class="accordion-body">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="showWisata"
                        checked
                      />
                      <label class="form-check-label" for="showWisata">
                        Tampilkan Semua
                      </label>
                    </div>
                  </div>
                </div>
              </div>

              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button
                    class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#sdaFilter"
                  >
                    Lahan & SDA
                  </button>
                </h2>
                <div id="sdaFilter" class="accordion-collapse collapse">
                  <div class="accordion-body">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="showSDA"
                        checked
                      />
                      <label class="form-check-label" for="showSDA">
                        Tampilkan Semua
                      </label>
                    </div>
                  </div>
                </div>
              </div>

              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button
                    class="accordion-button collapsed"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#kependudukanFilter"
                  >
                    Kependudukan
                  </button>
                </h2>
                <div
                  id="kependudukanFilter"
                  class="accordion-collapse collapse"
                >
                  <div class="accordion-body">
                    <div class="form-check">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        id="showKependudukan"
                        checked
                      />
                      <label class="form-check-label" for="showKependudukan">
                        Tampilkan Batas RW
                      </label>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <button class="btn btn-primary" id="routingBtn">
              Aktifkan Navigasi
            </button>

            <div
              class="mt-4 p-3"
              style="
                background: #f0f9ff;
                border-radius: 12px;
                border-left: 4px solid #0ea5e9;
              "
            >
              <small class="text-muted d-block mb-2" style="font-weight: 600"
                >Petunjuk:</small
              >
              <small class="text-muted d-block"
                >• Klik marker untuk info detail</small
              >
              <small class="text-muted d-block"
                >• Gunakan scroll untuk zoom</small
              >
              <small class="text-muted d-block"
                >• Aktifkan navigasi untuk rute</small
              >
            </div>
          </div>
        </div>

        <div class="col-lg-9 col-md-8 p-0">
          <div id="map"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="js/map.js"></script>
  </body>
</html>
